<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi Tiết Truyện</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/notifications.css">
    <link rel="stylesheet" href="css/toast.css">
    <link rel="stylesheet" href="css/layout.css">
    <style>
        .story-header { display: flex; gap: 20px; background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .story-cover { width: 200px; height: 300px; object-fit: cover; border-radius: 4px; }
        .story-meta { flex: 1; }
        .actions { margin-top: 15px; display: flex; gap: 10px; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #3498db; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-outline { background: transparent; border: 1px solid #3498db; color: #3498db; }
        
        .rating-section { margin-top: 15px; display: flex; align-items: center; gap: 10px; }
        .stars { color: #f1c40f; font-size: 20px; cursor: pointer; }
        .star-input { display: none; }
        .star-label:hover, .star-label:hover ~ .star-label { color: #f39c12; }
        
        .section { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .comment-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .comment-user { font-weight: bold; font-size: 0.9em; }
        .comment-date { color: #888; font-size: 0.8em; margin-left: 10px; }
        .comment-form { margin-top: 15px; }
        textarea { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ddd; resize: vertical; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">⬅ Về Trang Chủ</div>
        <div class="controls">
            <div class="notification">🔔 <span id="noti-badge" class="badge hidden">0</span></div>
            <div id="user-info" style="display:inline-block; margin-left:20px"></div>
        </div>
    </header>
    <main class="container">
        <div id="story-detail-container">
            <div class="story-header" id="story-info">
                <p>Đang tải thông tin truyện...</p>
            </div>
        </div>

        <div class="section">
            <h3>Danh Sách Chương</h3>
            <div id="chapters-container">Đang tải chương...</div>
        </div>

        <div class="section">
            <h3 style="margin-bottom: 10px;">Bình Luận</h3>
            <div id="comments-list">Đang tải bình luận...</div>
            <div class="comment-form">
                <textarea id="comment-content" rows="3" placeholder="Viết bình luận của bạn..."></textarea>
                <button id="btn-submit-comment" class="btn btn-primary" style="margin-top:10px">Gửi bình luận</button>
            </div>
        </div>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/patterns/Observer/NotificationObserver.js"></script>
    <script src="js/story-detail.js"></script>
</body>
</html>

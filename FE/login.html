<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - StoryReader</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-box { max-width: 400px; margin: 100px auto; padding: 30px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-login { width: 100%; padding: 10px; background: #2c3e50; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="text-align: center;">Đăng Nhập</h2>
        <div class="form-group">
            <label>Tên đăng nhập (Thử: tacgia1 hoặc docgia1)</label>
            <input type="text" id="username" value="tacgia1">
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="password" value="123456">
        </div>
        <button class="btn-login" id="btn-login">Vào hệ thống</button>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
